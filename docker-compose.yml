services:
  db:
    image: postgres:15-alpine
    container_name: rideshield_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rideshield}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rideshield123}
      POSTGRES_DB: ${POSTGRES_DB:-rideshield_db}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rideshield -d rideshield_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: rideshield_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@rideshield.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-change-me}
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: rideshield_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql+asyncpg://${POSTGRES_USER:-rideshield}:${POSTGRES_PASSWORD:-rideshield123}@db:5432/${POSTGRES_DB:-rideshield_db}}
      DATABASE_URL_SYNC: ${DATABASE_URL_SYNC_DOCKER:-postgresql://${POSTGRES_USER:-rideshield}:${POSTGRES_PASSWORD:-rideshield123}@db:5432/${POSTGRES_DB:-rideshield_db}}
      SIMULATION_MODE: "true"
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
